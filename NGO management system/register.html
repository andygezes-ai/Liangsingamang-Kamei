<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<style>
    /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:40px;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    flex-wrap:wrap;
}

/* Sign Up Card */
.header,
.hero{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    transition:.3s;
}

.header:hover,
.hero:hover{
    transform:translateY(-8px);
}

.header-item h1,
.container h1{
    text-align:center;
    margin-bottom:25px;
    color:#1e3a8a;
}

.child{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.child input{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    transition:.3s;
}

.child input:focus{
    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}

.btn{
    width:100%;
    padding:13px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
    transform:scale(1.02);
}

.child a{
    text-decoration:none;
    text-align:center;
    color:#2563eb;
    margin-top:5px;
}

.child a:hover{
    text-decoration:underline;
}

.child h5{
    font-size:15px;
    font-weight:500;
}
</style>
<body>
    <Section class="header">
        <div class="header-item">
            <h1>Sign Up for user section</h1>
        </div>
        <div class="child">
            <form action="#">
            <input type="text" placeholder="First Name" required />
            <input type="text" placeholder="Last Name" required />
            <input type="email" placeholder="Email" required />
            <input type="text" placeholder="Address" required />
            <input type="password" placeholder="Create Password" required />
            <input type="password" placeholder="Re-Enter Password" required />
            <button class="btn">Sign UP</button>
            </form>
        <a href="#signIn"><h5>Sign In ?</h5></a>
        <a href="#getpw.html"><h5>Forgot Password ?</h5></a>
        </div>
    </Section>
    


        </div>
    </section>
</body>
</html>
